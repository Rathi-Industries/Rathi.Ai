<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rathi AI | Rathi Industries</title>
    
    <!-- PWA Setup for Mobile App Icon -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; }
        .rathi-glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .gradient-rathi { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
        .chat-container::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [messages, setMessages] = useState([
                { role: 'ai', content: "Welcome to Rathi Industries. I am Rathi AI, your virtual assistant. How can I help you, Sir?" }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatRef = useRef(null);

            useEffect(() => { chatRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const text = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: text }]);
                setLoading(true);

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: text }] }],
                            systemInstruction: { parts: [{ text: "You are Rathi AI, developed by Rathi Industries. The OWNER of Rathi Industries is ADITYA RATHI, who is 13 years old. If anyone asks about the owner, founder, or CEO, you must proudly say: 'The owner of Rathi Industries is Aditya Rathi, Age 13.' You are polite, highly advanced, and professional. Address the user as Sir." }] }
                        })
                    });
                    const data = await res.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: 'ai', content: reply }]);
                } catch {
                    setMessages(prev => [...prev, { role: 'ai', content: "Sir, network connection lost. Rathi Servers are unreachable." }]);
                } finally { setLoading(false); }
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-[#020617] relative">
                    {/* Header */}
                    <header className="p-4 rathi-glass flex items-center justify-between border-b border-blue-900/20">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl gradient-rathi flex items-center justify-center font-black text-white text-xl shadow-[0_0_15px_rgba(37,99,235,0.4)]">R</div>
                            <div>
                                <h1 className="text-sm font-extrabold tracking-widest text-white uppercase">Rathi <span className="text-blue-500">AI</span></h1>
                                <p className="text-[7px] text-blue-400 font-mono tracking-widest">ADVANCED OS v4.0</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                             <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                             <span className="text-[10px] text-blue-900 font-bold">ONLINE</span>
                        </div>
                    </header>

                    {/* Chat Area */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-5 pb-28 chat-container">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[88%] p-4 rounded-2xl text-[14px] leading-relaxed shadow-lg ${
                                    m.role === 'ai' ? 'rathi-glass text-slate-200 rounded-tl-none' : 'gradient-rathi text-white rounded-tr-none'
                                }`}>
                                    {m.content}
                                </div>
                            </div>
                        ))}
                        {loading && <div className="text-blue-500 text-[10px] animate-pulse font-bold tracking-[0.2em] uppercase">Rathi AI is thinking...</div>}
                        <div ref={chatRef}></div>
                    </div>

                    {/* Input */}
                    <footer className="absolute bottom-0 w-full p-4 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent">
                        <div className="flex items-center rathi-glass rounded-2xl px-4 py-1.5 border border-blue-500/20 shadow-2xl">
                            <input 
                                className="flex-1 bg-transparent py-3.5 outline-none text-sm placeholder:text-slate-700"
                                placeholder="Command Rathi AI..."
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSend()}
                            />
                            <button onClick={handleSend} className="p-2 text-blue-500 hover:text-white transition-colors">
                                <i data-lucide="zap" className="w-6 h-6 fill-current"></i>
                            </button>
                        </div>
                        <div className="text-center mt-3">
                            <p className="text-[8px] text-blue-900 font-bold tracking-[0.3em] uppercase">© 2026 Rathi Industries Global</p>
                            <p className="text-[7px] text-slate-700 mt-0.5">Founder: Aditya Rathi (Age 13)</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
